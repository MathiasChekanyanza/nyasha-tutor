services:
  - type: web
    name: nyasha-tutor
    runtime: node
    repo: https://github.com/MathiasChekanyanza/nyasha-tutor
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NYASHA_PORT
        value: 10000
      - key: AI_BOS_URL
        value: http://127.0.0.1:18789
      - key: AI_BOS_TOKEN
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true
